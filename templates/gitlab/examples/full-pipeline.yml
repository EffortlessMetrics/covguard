# Full Pipeline Example
# =====================
# This example demonstrates a complete GitLab CI/CD pipeline with covguard
# integrated for diff-scoped coverage checking.
#
# Features demonstrated:
# - Multiple stages (build, test, coverage)
# - Language-specific templates (Rust in this example)
# - Coverage thresholds
# - MR comments
# - Code quality reports
# - Artifact management

# ===========================================
# STAGES
# ===========================================
stages:
  - build
  - test
  - coverage
  - deploy

# ===========================================
# VARIABLES
# ===========================================
variables:
  # Rust configuration
  RUST_TOOLCHAIN: "stable"
  
  # covguard configuration
  COVGUARD_VERSION: "latest"
  FAIL_THRESHOLD: "80"
  WARN_THRESHOLD: "90"
  POST_MR_COMMENT: "true"
  FAIL_ON_UNCOVERED: "true"
  
  # Build optimization
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  CARGO_INCREMENTAL: "0"

# ===========================================
# CACHE
# ===========================================
cache:
  key: "${CI_JOB_NAME}"
  paths:
    - .cargo/
    - target/

# ===========================================
# BUILD STAGE
# ===========================================
build:debug:
  stage: build
  image: rust:${RUST_TOOLCHAIN}
  script:
    - cargo build
  artifacts:
    paths:
      - target/debug/
    expire_in: 1 hour

build:release:
  stage: build
  image: rust:${RUST_TOOLCHAIN}
  script:
    - cargo build --release
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  artifacts:
    paths:
      - target/release/
    expire_in: 1 week

# ===========================================
# TEST STAGE
# ===========================================
test:unit:
  stage: test
  image: rust:${RUST_TOOLCHAIN}
  needs:
    - build:debug
  script:
    - cargo test --lib
  artifacts:
    reports:
      junit: target/test-results/junit.xml
    expire_in: 1 week

test:integration:
  stage: test
  image: rust:${RUST_TOOLCHAIN}
  needs:
    - build:debug
  script:
    - cargo test --test '*'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ===========================================
# COVERAGE STAGE
# ===========================================
# Include covguard templates
include:
  - remote: 'https://raw.githubusercontent.com/EffortlessMetrics/covguard/main/templates/gitlab/covguard-rust.yml'

# Diff coverage check for merge requests
covguard:mr:
  stage: coverage
  extends: .covguard_rust
  needs:
    - test:unit
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    FAIL_THRESHOLD: "80"
    WARN_THRESHOLD: "90"

# Full coverage report for main branch
covguard:main:
  stage: coverage
  extends: .covguard_rust
  needs:
    - test:unit
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    FAIL_THRESHOLD: "90"
    WARN_THRESHOLD: "95"
    BASE_REF: "${CI_COMMIT_BEFORE_SHA}"
    HEAD_REF: "${CI_COMMIT_SHA}"

# ===========================================
# DEPLOY STAGE
# ===========================================
deploy:staging:
  stage: deploy
  image: alpine:latest
  needs:
    - build:release
    - covguard:main
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - echo "Deploying to staging..."
    # Add your deployment commands here
  environment:
    name: staging
    url: https://staging.example.com

deploy:production:
  stage: deploy
  image: alpine:latest
  needs:
    - build:release
    - covguard:main
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  script:
    - echo "Deploying to production..."
    # Add your deployment commands here
  environment:
    name: production
    url: https://example.com

