# covguard GitLab CI Base Template
# =================================
# This template provides the base job definition for running covguard
# diff-scoped coverage checks in GitLab CI/CD pipelines.
#
# Usage:
#   include:
#     - remote: 'https://raw.githubusercontent.com/your-org/covguard/main/templates/gitlab/covguard-base.yml'
#   
#   variables:
#     COVERAGE_FILE: "coverage/lcov.info"
#     FAIL_THRESHOLD: "80"
#
#   covguard:
#     extends: .covguard_base

# Configuration Variables
# -----------------------
# COVGUARD_VERSION      - Version of covguard to use (default: latest)
# COVERAGE_FILE         - Path to the coverage report file (required)
# COVERAGE_FORMAT       - Format: lcov, jacoco, coverage-py (default: lcov)
# FAIL_THRESHOLD        - Minimum coverage % to pass (default: 0)
# WARN_THRESHOLD        - Minimum coverage % to warn (default: 0)
# POST_MR_COMMENT       - Post MR comment with results (default: "true")
# FAIL_ON_UNCOVERED     - Fail if uncovered lines found (default: "true")
# BASE_REF              - Base ref for diff (default: $CI_MERGE_REQUEST_DIFF_BASE_SHA)
# HEAD_REF              - Head ref for diff (default: $CI_COMMIT_SHA)
# COVGUARD_IMAGE        - Docker image to use (default: ghcr.io/your-org/covguard)

variables:
  COVGUARD_VERSION: "latest"
  COVERAGE_FORMAT: "lcov"
  FAIL_THRESHOLD: "0"
  WARN_THRESHOLD: "0"
  POST_MR_COMMENT: "true"
  FAIL_ON_UNCOVERED: "true"
  COVGUARD_IMAGE: "ghcr.io/covguard/covguard"

# Base job definition
# -------------------
.covguard_base:
  stage: test
  image: "${COVGUARD_IMAGE}:${COVGUARD_VERSION}"
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    GIT_DEPTH: 0
  before_script:
    - |
      # Validate required variables
      if [ -z "$COVERAGE_FILE" ]; then
        echo "Error: COVERAGE_FILE variable is required"
        exit 1
      fi
      
      # Set default refs for merge requests
      if [ -z "$BASE_REF" ]; then
        export BASE_REF="${CI_MERGE_REQUEST_DIFF_BASE_SHA:-$CI_COMMIT_BEFORE_SHA}"
      fi
      if [ -z "$HEAD_REF" ]; then
        export HEAD_REF="${CI_COMMIT_SHA}"
      fi
      
      echo "covguard configuration:"
      echo "  Coverage file: ${COVERAGE_FILE}"
      echo "  Coverage format: ${COVERAGE_FORMAT}"
      echo "  Base ref: ${BASE_REF}"
      echo "  Head ref: ${HEAD_REF}"
      echo "  Fail threshold: ${FAIL_THRESHOLD}%"
      echo "  Warn threshold: ${WARN_THRESHOLD}%"
  script:
    - |
      # Build covguard arguments
      COVGUARD_ARGS="check"
      COVGUARD_ARGS="${COVGUARD_ARGS} --base ${BASE_REF}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --head ${HEAD_REF}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --lcov ${COVERAGE_FILE}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --out ${CI_PROJECT_DIR}/covguard-report.json"
      
      # Add optional arguments
      if [ -n "$FAIL_THRESHOLD" ] && [ "$FAIL_THRESHOLD" != "0" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --fail-threshold ${FAIL_THRESHOLD}"
      fi
      
      if [ -n "$WARN_THRESHOLD" ] && [ "$WARN_THRESHOLD" != "0" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --warn-threshold ${WARN_THRESHOLD}"
      fi
      
      if [ "${FAIL_ON_UNCOVERED}" = "false" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --no-fail-on-uncovered"
      fi
      
      if [ "${COVERAGE_FORMAT}" = "jacoco" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --format jacoco"
      elif [ "${COVERAGE_FORMAT}" = "coverage-py" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --format coverage-py"
      fi
      
      # Generate markdown output for MR comments
      if [ "${POST_MR_COMMENT}" = "true" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --md ${CI_PROJECT_DIR}/covguard-comment.md"
      fi
      
      echo "Running: covguard ${COVGUARD_ARGS}"
      covguard $COVGUARD_ARGS
  after_script:
    - |
      # Post MR comment if enabled and we're in an MR
      if [ "${POST_MR_COMMENT}" = "true" ] && [ -n "$CI_MERGE_REQUEST_IID" ] && [ -f "${CI_PROJECT_DIR}/covguard-comment.md" ]; then
        echo "Posting merge request comment..."
        
        COMMENT_BODY=$(cat "${CI_PROJECT_DIR}/covguard-comment.md" | jq -Rs .)
        
        curl -s -X POST \
          -H "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
          -H "Content-Type: application/json" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" \
          -d "{\"body\": ${COMMENT_BODY}}" || echo "Warning: Failed to post MR comment"
      fi
  artifacts:
    when: always
    paths:
      - covguard-report.json
      - covguard-comment.md
    reports:
      codequality: covguard-report.json
    expire_in: 1 week

# Job for MR coverage check (extends base)
# ----------------------------------------
covguard:mr:
  extends: .covguard_base
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Job for branch coverage check (extends base)
# --------------------------------------------
covguard:branch:
  extends: .covguard_base
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    BASE_REF: "${CI_COMMIT_BEFORE_SHA}"
    HEAD_REF: "${CI_COMMIT_SHA}"

# Hidden template for custom configuration
# ----------------------------------------
# Use this when you need full control over the job
.covguard_template:
  extends: .covguard_base
  allow_failure: true
