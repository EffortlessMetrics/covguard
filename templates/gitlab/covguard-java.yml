# covguard GitLab CI Template for Java
# =====================================
# This template provides a complete setup for running covguard
# with Java projects using JaCoCo for coverage generation.
#
# Usage:
#   include:
#     - remote: 'https://raw.githubusercontent.com/your-org/covguard/main/templates/gitlab/covguard-java.yml'
#
#   covguard:java:
#     extends: .covguard_java

# Configuration Variables
# -----------------------
# JAVA_VERSION          - Java version to use (default: 17)
# MAVEN_VERSION         - Maven version to use (default: 3.9)
# COVGUARD_VERSION      - Version of covguard to use (default: latest)
# FAIL_THRESHOLD        - Minimum coverage % to pass (default: 0)
# WARN_THRESHOLD        - Minimum coverage % to warn (default: 0)
# POST_MR_COMMENT       - Post MR comment with results (default: "true")
# FAIL_ON_UNCOVERED     - Fail if uncovered lines found (default: "true")
# JACOCO_REPORT_PATH    - Path to JaCoCo XML report (default: target/site/jacoco/jacoco.xml)
# BUILD_TOOL            - Build tool: maven or gradle (default: maven)
# EXTRA_BUILD_ARGS      - Extra arguments for build tool (default: "")

variables:
  JAVA_VERSION: "17"
  MAVEN_VERSION: "3.9"
  COVGUARD_VERSION: "latest"
  FAIL_THRESHOLD: "0"
  WARN_THRESHOLD: "0"
  POST_MR_COMMENT: "true"
  FAIL_ON_UNCOVERED: "true"
  JACOCO_REPORT_PATH: "target/site/jacoco/jacoco.xml"
  BUILD_TOOL: "maven"
  EXTRA_BUILD_ARGS: ""

# Java coverage job using JaCoCo
# ------------------------------
.covguard_java:
  stage: test
  image: maven:${MAVEN_VERSION}-eclipse-temurin-${JAVA_VERSION}
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    GIT_DEPTH: 0
    MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"
    MAVEN_CLI_OPTS: "-s .m2/settings.xml --batch-mode"
  cache:
    paths:
      - .m2/repository/
  before_script:
    - |
      # Install covguard
      apt-get update && apt-get install -y curl jq
      
      if [ "${COVGUARD_VERSION}" = "latest" ]; then
        curl -sSL https://github.com/covguard/covguard/releases/latest/download/covguard-linux-x86_64.tar.gz | tar xz -C /usr/local/bin
      else
        curl -sSL https://github.com/covguard/covguard/releases/download/v${COVGUARD_VERSION}/covguard-linux-x86_64.tar.gz | tar xz -C /usr/local/bin
      fi
      
      # Set default refs for merge requests
      if [ -z "$BASE_REF" ]; then
        export BASE_REF="${CI_MERGE_REQUEST_DIFF_BASE_SHA:-$CI_COMMIT_BEFORE_SHA}"
      fi
      if [ -z "$HEAD_REF" ]; then
        export HEAD_REF="${CI_COMMIT_SHA}"
      fi
      
      echo "covguard Java configuration:"
      echo "  Java version: ${JAVA_VERSION}"
      echo "  Build tool: ${BUILD_TOOL}"
      echo "  Base ref: ${BASE_REF}"
      echo "  Head ref: ${HEAD_REF}"
      echo "  JaCoCo report: ${JACOCO_REPORT_PATH}"
      echo "  Fail threshold: ${FAIL_THRESHOLD}%"
      echo "  Warn threshold: ${WARN_THRESHOLD}%"
  script:
    - |
      # Run tests with JaCoCo coverage
      echo "Running tests with coverage..."
      
      if [ "${BUILD_TOOL}" = "maven" ]; then
        mvn ${MAVEN_CLI_OPTS} clean test jacoco:report ${EXTRA_BUILD_ARGS}
      elif [ "${BUILD_TOOL}" = "gradle" ]; then
        ./gradlew clean test jacocoTestReport ${EXTRA_BUILD_ARGS}
        # Update JACOCO_REPORT_PATH for Gradle default location
        export JACOCO_REPORT_PATH="${JACOCO_REPORT_PATH:-build/reports/jacoco/test/jacocoTestReport.xml}"
      fi
      
      # Check if JaCoCo report exists
      if [ ! -f "${JACOCO_REPORT_PATH}" ]; then
        echo "Error: JaCoCo report not found at ${JACOCO_REPORT_PATH}"
        exit 1
      fi
      
      # Build covguard arguments
      COVGUARD_ARGS="check"
      COVGUARD_ARGS="${COVGUARD_ARGS} --base ${BASE_REF}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --head ${HEAD_REF}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --jacoco ${JACOCO_REPORT_PATH}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --out ${CI_PROJECT_DIR}/covguard-report.json"
      
      # Add optional arguments
      if [ -n "$FAIL_THRESHOLD" ] && [ "$FAIL_THRESHOLD" != "0" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --fail-threshold ${FAIL_THRESHOLD}"
      fi
      
      if [ -n "$WARN_THRESHOLD" ] && [ "$WARN_THRESHOLD" != "0" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --warn-threshold ${WARN_THRESHOLD}"
      fi
      
      if [ "${FAIL_ON_UNCOVERED}" = "false" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --no-fail-on-uncovered"
      fi
      
      # Generate markdown output for MR comments
      if [ "${POST_MR_COMMENT}" = "true" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --md ${CI_PROJECT_DIR}/covguard-comment.md"
      fi
      
      echo "Running: covguard ${COVGUARD_ARGS}"
      covguard $COVGUARD_ARGS
  after_script:
    - |
      # Post MR comment if enabled and we're in an MR
      if [ "${POST_MR_COMMENT}" = "true" ] && [ -n "$CI_MERGE_REQUEST_IID" ] && [ -f "${CI_PROJECT_DIR}/covguard-comment.md" ]; then
        echo "Posting merge request comment..."
        
        COMMENT_BODY=$(cat "${CI_PROJECT_DIR}/covguard-comment.md" | jq -Rs .)
        
        curl -s -X POST \
          -H "PRIVATE-TOKEN: ${CI_JOB_TOKEN}" \
          -H "Content-Type: application/json" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/merge_requests/${CI_MERGE_REQUEST_IID}/notes" \
          -d "{\"body\": ${COMMENT_BODY}}" || echo "Warning: Failed to post MR comment"
      fi
  artifacts:
    when: always
    paths:
      - covguard-report.json
      - covguard-comment.md
      - target/site/jacoco/
      - "**/jacoco.exec"
    reports:
      codequality: covguard-report.json
      coverage_report:
        coverage_format: jacoco
        path: target/site/jacoco/jacoco.xml
    expire_in: 1 week
  coverage: '/Total.*?([0-9]{1,3})%/'

# Java MR coverage check
# ----------------------
covguard:java:mr:
  extends: .covguard_java
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# Java branch coverage check
# --------------------------
covguard:java:branch:
  extends: .covguard_java
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  variables:
    BASE_REF: "${CI_COMMIT_BEFORE_SHA}"
    HEAD_REF: "${CI_COMMIT_SHA}"

# Java coverage with Gradle (alternative)
# ---------------------------------------
# Use this if you use Gradle for building
.covguard_java_gradle:
  extends: .covguard_java
  image: gradle:8-jdk${JAVA_VERSION}
  variables:
    BUILD_TOOL: "gradle"
    JACOCO_REPORT_PATH: "build/reports/jacoco/test/jacocoTestReport.xml"
  cache:
    paths:
      - .gradle/caches/
      - .gradle/wrapper/

# Java coverage with Maven and multi-module project
# -------------------------------------------------
# Use this for multi-module Maven projects
.covguard_java_multimodule:
  extends: .covguard_java
  variables:
    JACOCO_AGGREGATE_REPORT: "target/site/jacoco-aggregate/jacoco.xml"
  script:
    - |
      # Run tests with JaCoCo coverage for all modules
      echo "Running tests with coverage (multi-module)..."
      
      mvn ${MAVEN_CLI_OPTS} clean test jacoco:report jacoco:aggregate ${EXTRA_BUILD_ARGS}
      
      # Check if aggregated JaCoCo report exists
      if [ ! -f "${JACOCO_AGGREGATE_REPORT}" ]; then
        echo "Error: Aggregated JaCoCo report not found at ${JACOCO_AGGREGATE_REPORT}"
        exit 1
      fi
      
      # Build covguard arguments
      COVGUARD_ARGS="check"
      COVGUARD_ARGS="${COVGUARD_ARGS} --base ${BASE_REF}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --head ${HEAD_REF}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --jacoco ${JACOCO_AGGREGATE_REPORT}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --out ${CI_PROJECT_DIR}/covguard-report.json"
      
      # Add optional arguments
      if [ -n "$FAIL_THRESHOLD" ] && [ "$FAIL_THRESHOLD" != "0" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --fail-threshold ${FAIL_THRESHOLD}"
      fi
      
      if [ -n "$WARN_THRESHOLD" ] && [ "$WARN_THRESHOLD" != "0" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --warn-threshold ${WARN_THRESHOLD}"
      fi
      
      if [ "${FAIL_ON_UNCOVERED}" = "false" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --no-fail-on-uncovered"
      fi
      
      # Generate markdown output for MR comments
      if [ "${POST_MR_COMMENT}" = "true" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --md ${CI_PROJECT_DIR}/covguard-comment.md"
      fi
      
      echo "Running: covguard ${COVGUARD_ARGS}"
      covguard $COVGUARD_ARGS

# Java coverage with Spring Boot
# ------------------------------
# Optimized for Spring Boot applications
.covguard_java_springboot:
  extends: .covguard_java
  script:
    - |
      # Run tests with JaCoCo coverage (Spring Boot optimized)
      echo "Running Spring Boot tests with coverage..."
      
      mvn ${MAVEN_CLI_OPTS} clean verify ${EXTRA_BUILD_ARGS}
      
      # Check if JaCoCo report exists
      if [ ! -f "${JACOCO_REPORT_PATH}" ]; then
        echo "Error: JaCoCo report not found at ${JACOCO_REPORT_PATH}"
        exit 1
      fi
      
      # Build covguard arguments
      COVGUARD_ARGS="check"
      COVGUARD_ARGS="${COVGUARD_ARGS} --base ${BASE_REF}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --head ${HEAD_REF}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --jacoco ${JACOCO_REPORT_PATH}"
      COVGUARD_ARGS="${COVGUARD_ARGS} --out ${CI_PROJECT_DIR}/covguard-report.json"
      
      # Add optional arguments
      if [ -n "$FAIL_THRESHOLD" ] && [ "$FAIL_THRESHOLD" != "0" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --fail-threshold ${FAIL_THRESHOLD}"
      fi
      
      if [ -n "$WARN_THRESHOLD" ] && [ "$WARN_THRESHOLD" != "0" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --warn-threshold ${WARN_THRESHOLD}"
      fi
      
      if [ "${FAIL_ON_UNCOVERED}" = "false" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --no-fail-on-uncovered"
      fi
      
      # Generate markdown output for MR comments
      if [ "${POST_MR_COMMENT}" = "true" ]; then
        COVGUARD_ARGS="${COVGUARD_ARGS} --md ${CI_PROJECT_DIR}/covguard-comment.md"
      fi
      
      echo "Running: covguard ${COVGUARD_ARGS}"
      covguard $COVGUARD_ARGS
