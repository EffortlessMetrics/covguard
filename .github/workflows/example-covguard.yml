# Example workflow: Diff Coverage Check with covguard
#
# This workflow demonstrates how to use the covguard GitHub Action
# to enforce diff-scoped coverage on pull requests.
#
# The workflow:
# 1. Runs tests and generates coverage
# 2. Uses covguard to check diff coverage
# 3. Posts results as a PR comment
# 4. Fails if new/changed code is not covered

name: Diff Coverage

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

# Ensure only one workflow runs per PR at a time
concurrency:
  group: diff-coverage-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # First, run tests and generate coverage
  coverage:
    name: Generate Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for accurate diffs

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: |
          cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: lcov.info
          retention-days: 1

  # Run covguard diff coverage check
  diff-coverage:
    name: Check Diff Coverage
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for git diff

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      # Basic usage: Fail on any uncovered lines
      - name: Check diff coverage
        id: covguard
        uses: ./.github/actions/covguard
        with:
          lcov-file: lcov.info
          comment-pr: true
          artifact-name: covguard-report-basic

      # Use outputs in subsequent steps
      - name: Coverage summary
        run: |
          echo "Coverage check passed: ${{ steps.covguard.outputs.passed }}"
          echo "Diff coverage: ${{ steps.covguard.outputs.coverage-percent }}%"
          echo "Uncovered lines: ${{ steps.covguard.outputs.uncovered-lines }}"
          echo "Report: ${{ steps.covguard.outputs.report-path }}"

  # Example: With minimum threshold
  diff-coverage-threshold:
    name: Check Diff Coverage (80% threshold)
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Check diff coverage with threshold
        uses: ./.github/actions/covguard
        with:
          lcov-file: lcov.info
          threshold: 80
          comment-pr: true
          comment-mode: update
          artifact-name: covguard-report-threshold

  # Example: With SARIF output for Code Scanning
  diff-coverage-sarif:
    name: Check Diff Coverage (SARIF)
    runs-on: ubuntu-latest
    needs: coverage
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-report

      - name: Check diff coverage with SARIF
        uses: ./.github/actions/covguard
        with:
          lcov-file: lcov.info
          sarif-output: true
          threshold: 0  # Non-blocking for SARIF upload
          artifact-name: covguard-report-sarif

