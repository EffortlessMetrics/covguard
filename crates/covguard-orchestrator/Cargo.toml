covguard-policy = { path = "../covguard-policy", version = "0.1.0" }
covguard-reporting = { path = "../covguard-reporting", version = "0.1.0" }
covguard-directives.workspace = true
covguard-output = { path = "../covguard-output", version = "0.1.0" }
covguard-output-features.workspace = true
covguard-config = { path = "../covguard-config", version = "0.1.0" }
thiserror.workspace = true
chrono.workspace = true
