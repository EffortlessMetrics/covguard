[package]
name = "covguard-orchestrator"
description = "Application orchestration layer for covguard"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/covguard-orchestrator"
keywords = ["orchestration", "coverage", "diff", "testing", "ci"]
