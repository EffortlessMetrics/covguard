cucumber = { workspace = true }
futures = { workspace = true }
covguard-policy = { path = "../covguard-policy", version = "0.1.0" }
covguard-types.workspace = true
covguard-output.workspace = true
covguard-output-features.workspace = true
serde_json.workspace = true
chrono.workspace = true

[[test]]
name = "bdd"
harness = false
