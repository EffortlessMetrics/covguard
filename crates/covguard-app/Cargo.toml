[package]
name = "covguard-app"
description = "Compatibility facade over covguard-orchestrator"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation = "https://docs.rs/covguard-app"
keywords = ["orchestration", "coverage", "diff", "testing", "ci"]
